# Dependabot version updates (yearly cadence — 1st of January).
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: yearly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10

  - package-ecosystem: npm
    directory: /.github/pinned/markdownlint
    schedule:
      interval: yearly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /.github/pinned/codespell
    schedule:
      interval: yearly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
