# GitHub Actions static analysis (manual only).
# Local reproduction: bash .github/scripts/run-local-zizmor.sh
name: Zizmor

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.workflow }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  audit:
    name: GitHub Actions security (zizmor)
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Run zizmor
        run: uvx zizmor==1.25.2 --offline --color=always .
