# SBOM generation (Syft) + vulnerability scan (Grype on SBOM); SARIF → Code Scanning.
# Runs on schedule only (plus workflow_dispatch). Local: .github/scripts/run-local-supply-chain.sh
name: Supply chain (Syft + Grype)

on:
  schedule:
    # Quarterly — 1st of Jan/Apr/Jul/Oct at 22:18 UTC.
    - cron: "18 22 1 1,4,7,10 *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-sbom-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  sbom-grype:
    name: SBOM + Grype
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Generate SBOM (Syft / SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          config: .syft.yaml
          upload-release-assets: false
          dependency-snapshot: false

      - name: Vulnerability scan (Grype on SBOM)
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom.spdx.json
          fail-build: false
          severity-cutoff: high

      - name: Upload Grype SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: success() || failure()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-sbom
