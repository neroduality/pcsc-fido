# SBOM generation (Syft) + vulnerability scan (Grype on SBOM); SARIF → Code Scanning.
# Runs on schedule only (plus workflow_dispatch). Local: .github/scripts/run-local-supply-chain.sh
name: Supply chain (Syft + Grype)

on:
  schedule:
    - cron: "18 7 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supply-chain-sbom-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  sbom-grype:
    name: SBOM + Grype
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate SBOM (Syft / SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          config: .syft.yaml
          upload-release-assets: false
          dependency-snapshot: false

      - name: Vulnerability scan (Grype on SBOM)
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          sbom: sbom.spdx.json
          fail-build: false
          severity-cutoff: high

      - name: Upload Grype SARIF to code scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: success() || failure()
        continue-on-error: true
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-sbom
