# Code scanning — C via CMake build of pcsc-fido.
# Runs on schedule only (plus workflow_dispatch).
# Local reproduction: bash .github/scripts/ci-codeql-build.sh (CodeQL CLI + database create is CI-only today)
name: CodeQL

on:
  schedule:
    - cron: "32 6 * * 2"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (c)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      security-events: write

    env:
      # Manual traced C++ builds are incompatible with overlay-base caching on
      # default-branch runs; disable overlay up front to avoid analyze warnings.
      CODEQL_OVERLAY_DATABASE_MODE: none

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install dependencies
        env:
          AUTO_INSTALL_LINUX_DEPS: 1
          PCSC_FIDO_ALLOW_SUDO_DEPS: 1
        run: bash .github/scripts/install-linux-deps.sh

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: cpp
          build-mode: manual
          config-file: .github/codeql/codeql-config.yml

      - name: CodeQL traced build (CMake)
        run: bash .github/scripts/ci-codeql-build.sh

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:cpp"
