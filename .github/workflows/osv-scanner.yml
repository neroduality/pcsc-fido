# OSV.dev dependency vulnerability scans (lockfiles / manifests).
# Runs on schedule only (plus workflow_dispatch). Local: .github/scripts/run-local-osv-scanner.sh
# Reusable workflow: https://google.github.io/osv-scanner/github-action/
name: OSV-Scanner

on:
  schedule:
    - cron: "45 7 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: osv-scanner-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  scan:
    permissions:
      actions: read
      security-events: write
      contents: read
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
