# OpenSSF Scorecard analysis — uploads SARIF to GitHub code scanning when enabled.
# Runs on schedule only (plus workflow_dispatch). Must stay aligned with upstream
# restrictions when publish_results is true:
# https://github.com/ossf/scorecard-action/blob/main/README.md
#
# Local reproduction: .github/scripts/run-local-openssf.sh
name: OpenSSF Scorecard

on:
  schedule:
    # Weekly — Saturdays 01:30 UTC (matches upstream default cadence).
    - cron: "30 1 * * 6"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: results.sarif
